<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mdReader - Distraction-Free Markdown Viewer</title>
  <meta name="description" content="A clean, client-side, distraction-free markdown reader and viewer with custom themes, presentation mode, auto Table of Contents, and full-text search.">
  
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Outfit:wght@300..900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/libertinus-serif/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/opendyslexic/index.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/print.css" media="print">

  <!-- External CDNs -->
  <!-- marked.js for markdown compiling (UMD browser build) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.4/lib/marked.umd.js"></script>
  <!-- KaTeX for formula rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.10/lib/index.umd.js"></script>
  <!-- DOMPurify to prevent XSS -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <!-- highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-theme-light">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-theme-dark" disabled>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <!-- mermaid.js for flowcharts & diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
</head>
<body class="theme-light">

  <div id="app" class="app-container">
    <!-- Landing / Dropzone Area -->
    <section id="landing-zone" class="landing-zone">
      <div class="drop-card" id="drop-card">
        <div class="drop-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
          </svg>
        </div>
        <h2 data-i18n="landingTitle">Carregar Documento Markdown</h2>
        <p data-i18n="landingDesc">Arraste o arquivo aqui ou clique para selecionar</p>
        <input type="file" id="file-input" accept=".md,.markdown,.txt" class="hidden-input">
        <button class="btn btn-primary" id="browse-btn" data-i18n="selectFile">Selecionar Arquivo</button>
      </div>
    </section>

    <!-- Reading Environment -->
    <main id="reader-layout" class="reader-layout hidden">
      <!-- Top Navbar / Controls -->
      <header class="reader-header">
        <div class="header-left">
          <button class="btn-icon" id="btn-back-landing" title="Load another file" aria-label="Load another file" data-i18n-title="backLandingTitle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </button>
          <button class="btn-icon mobile-only" id="btn-toggle-toc" title="Table of Contents"
            aria-label="Toggle table of contents" aria-expanded="false" aria-controls="toc-sidebar" data-i18n-title="toggleTocTitle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="file-info">
            <span class="file-name" id="display-file-name">documento.md</span>
            <span class="file-size" id="display-file-size">0 KB</span>
          </div>
        </div>

        <div class="header-right">
          <!-- Search Bar -->
          <label class="search-container" for="search-input">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" placeholder="Buscar no documento..." aria-label="Buscar" data-i18n-placeholder="searchPlaceholder">
            <div class="search-controls hidden" id="search-controls">
              <span class="search-counter" id="search-counter">0 de 0</span>
              <button class="btn-icon-small" id="search-prev" title="Resultado anterior" aria-label="Resultado anterior" data-i18n-title="searchPrevTitle">▲</button>
              <button class="btn-icon-small" id="search-next" title="Próximo resultado" aria-label="Próximo resultado" data-i18n-title="searchNextTitle">▼</button>
            </div>
          </label>

          <!-- Utility Options -->
          <button class="btn btn-secondary desktop-only" id="btn-presentation" title="Modo de Apresentação" aria-label="Modo de apresentação" data-i18n-title="presentationTitle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span class="slides-label" data-i18n="slides">Slides</span>
          </button>

          <button class="btn-icon" id="btn-toggle-settings" title="Settings"
            aria-label="Open appearance settings" aria-expanded="false" aria-controls="settings-panel" data-i18n-title="settingsTooltip">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
        <div id="reading-progress"></div>
      </header>

      <!-- Main Columns -->
      <div class="content-wrapper">
        <!-- Sidebar Navigation (Table of Contents) -->
        <aside class="toc-sidebar" id="toc-sidebar">
          <div class="toc-header">
            <h3 data-i18n="tocTitle">Índice</h3>
            <button class="btn-close mobile-only" id="btn-close-toc" aria-label="Fechar índice" data-i18n-aria-label="closeToc">&times;</button>
          </div>
          <nav class="toc-nav" id="toc-nav-container">
            <!-- Links gerados dinamicamente -->
            <p class="toc-empty" data-i18n="tocEmpty">Sem títulos encontrados</p>
          </nav>
        </aside>

        <!-- Reading Canvas -->
        <div class="reading-canvas" id="reading-canvas">
          <article class="markdown-body font-serif" id="render-target">
            <!-- Rendered Markdown goes here -->
          </article>
        </div>
      </div>

      <!-- Settings Sidebar Panel -->
      <aside class="settings-panel" id="settings-panel">
        <div class="settings-header">
          <h3 data-i18n="settingsTitle">Configurações de Aparência</h3>
          <button class="btn-close" id="btn-close-settings" aria-label="Fechar configurações" data-i18n-aria-label="closeSettings">&times;</button>
        </div>
        
        <div class="settings-group">
          <label data-i18n="themeLabel">Tema</label>
          <div class="theme-buttons">
            <button class="btn-toggle active" data-theme="light" data-i18n="themeLight">Claro</button>
            <button class="btn-toggle" data-theme="sepia" data-i18n="themeSepia">Sepia</button>
            <button class="btn-toggle" data-theme="dark" data-i18n="themeDark">Escuro</button>
          </div>
        </div>

        <div class="settings-group">
          <label data-i18n="fontLabel">Fonte</label>
          <div class="font-buttons">
            <button class="btn-toggle" data-font="sans">Outfit</button>
            <button class="btn-toggle active" data-font="serif">Libertinus</button>
            <button class="btn-toggle" data-font="swiss">Inter</button>
            <button class="btn-toggle" data-font="dyslexic">OpenDyslexic</button>
          </div>
        </div>

        <div class="settings-group desktop-only">
          <label data-i18n="layoutLabel">Layout</label>
          <div class="layout-buttons">
            <button class="btn-toggle active" data-layout="single" data-i18n="layoutSingle">Coluna Única</button>
            <button class="btn-toggle" data-layout="columns" data-i18n="layoutColumns">Duas Colunas</button>
          </div>
        </div>

        <div class="settings-group">
          <label data-i18n="alignmentLabel">Alinhamento do Texto</label>
          <div class="alignment-buttons">
            <button class="btn-toggle active" data-align="left" data-i18n="alignLeft">Esquerda</button>
            <button class="btn-toggle" data-align="justify" data-i18n="alignJustify">Justificado</button>
          </div>
        </div>

        <div class="settings-group">
          <label data-i18n="langLabel">Idioma / Language</label>
          <div class="lang-buttons">
            <button class="btn-toggle active" data-lang="pt">Português</button>
            <button class="btn-toggle" data-lang="en">English</button>
          </div>
        </div>

        <div class="settings-group">
          <label data-i18n="fontSizeLabel">Tamanho da Fonte</label>
          <div class="range-control">
            <input type="range" id="setting-font-size" min="14" max="24" value="18">
            <span class="range-val" id="val-font-size">18px</span>
          </div>
        </div>

        <div class="settings-group">
          <label data-i18n="lineHeightLabel">Espaçamento de Linha</label>
          <div class="range-control">
            <input type="range" id="setting-line-height" min="1.4" max="2.0" step="0.1" value="1.6">
            <span class="range-val" id="val-line-height">1.6</span>
          </div>
        </div>

        <div class="settings-group">
          <label data-i18n="maxWidthLabel">Largura Máxima</label>
          <div class="range-control">
            <input type="range" id="setting-max-width" min="45" max="75" step="1" value="65">
            <span class="range-val" id="val-max-width">65ch</span>
          </div>
        </div>

        <div class="settings-group border-top">
          <button class="btn btn-secondary w-full" id="btn-reset-settings" style="color: var(--text-muted); border-color: transparent;" data-i18n="restoreDefaults">↺ Restaurar Padrões</button>
        </div>

        <div class="settings-group border-top">
          <label data-i18n="exportLabel">Exportar</label>
          <div class="export-actions">
            <button class="btn btn-secondary w-full" id="btn-export-html" data-i18n="exportHtml">Exportar como HTML</button>
            <button class="btn btn-secondary w-full" id="btn-export-pdf" data-i18n="exportPdf">Imprimir / Exportar PDF</button>
          </div>
        </div>
      </aside>
    </main>

    <!-- Presentation Mode Overlay -->
    <section id="presentation-mode" class="presentation-mode hidden">
      <header class="presentation-header">
        <span class="slide-title" id="slide-title">Presentation Title</span>
        <button class="btn-close-presentation" id="btn-close-presentation" title="Exit Presentation Mode" aria-label="Exit presentation mode" data-i18n-title="exitPresentation" data-i18n-aria-label="exitPresentation">&times;</button>
      </header>
      <div class="slide-container" id="slide-container">
        <!-- Dynamic active slide content -->
      </div>
      <footer class="presentation-footer">
        <button class="btn-slide-nav" id="slide-prev" aria-label="Slide anterior" data-i18n="prevSlide" data-i18n-aria-label="prevSlide">◀ Anterior</button>
        <span class="slide-counter" id="slide-counter" aria-live="polite" aria-atomic="true">1 / 1</span>
        <button class="btn-slide-nav" id="slide-next" aria-label="Próximo slide" data-i18n="nextSlide" data-i18n-aria-label="nextSlide">Próximo ▶</button>
      </footer>
    </section>
  </div>

  <!-- Scripts -->
  <script src="js/translations.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/toc.js"></script>
  <script src="js/search.js"></script>
  <script src="js/export.js"></script>
  <script src="js/presentation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/file-loader.js"></script>
  <script src="js/app.js"></script>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>
</body>
</html>
